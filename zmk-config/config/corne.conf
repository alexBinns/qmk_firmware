# Corne ZMK config — ported from QMK keymaps/mine
# ──────────────────────────────────────────────────────────────────────────────

# One-shot (sticky) key release timeout: 2000ms
# Mirrors QMK: #define ONESHOT_TIMEOUT 2000
CONFIG_ZMK_BEHAVIOR_STICKY_KEY_RELEASE_AFTER_MS=2000

# OLED display (SSD1306, same as mine/rules.mk OLED_ENABLE=yes)
# Note: ZMK uses built-in widgets (layer name, WPM, etc.) rather than
# a custom glcdfont. The custom glcdfont.c from the QMK keymap cannot
# be directly ported.
CONFIG_ZMK_DISPLAY=y

# RGB underglow off (mirrors mine/rules.mk RGBLIGHT_ENABLE=no)
CONFIG_ZMK_RGB_UNDERGLOW=n

# Mouse keys (mirrors mine/rules.mk MOUSEKEY_ENABLE=yes)
CONFIG_ZMK_MOUSE=y

# Extra media/consumer keys (mirrors mine/rules.mk EXTRAKEY_ENABLE=yes)
# ZMK includes these by default; no explicit flag needed.

# Left half is the central (USB) side.
# Mirrors QMK: #define MASTER_LEFT
# This is the default for the corne_left shield; no override needed.

# ──────────────────────────────────────────────────────────────────────────────
# Porting notes / limitations:
#
# 1. ONESHOT_TAP_TOGGLE 3 (lock key after 3 taps) — no ZMK equivalent.
# 2. Custom glcdfont.c (OLED art) — not portable; ZMK uses its own widget
#    system. Consider ZMK's WPM widget or status bar instead.
# 3. TAPPING_TERM_PER_KEY / TAPPING_TERM_THUMB 125ms — handled per-behavior
#    in corne.keymap (mt_hp uses 200ms; thumb lt uses the default mo behavior).
# 4. QMK HOLD_ON_OTHER_KEY_PRESS + PERMISSIVE_HOLD → flavor = "hold-preferred"
#    in the mt_hp behavior defined in corne.keymap.
# ──────────────────────────────────────────────────────────────────────────────
