# ZMK build matrix for Corne (crkbd)
#
# Default board: nice!nano v2 (nRF52840).
# If you use a different MCU (e.g. nice!nano v1, Seeed XIAO BLE),
# replace "nice_nano_v2" with the appropriate board identifier.
# See: https://zmk.dev/docs/hardware
#
# To build with GitHub Actions, push this repo and use the zmkfirmware/zmk
# workflow (Add to a zmk-config repo and connect to zmk-user-config).

include:
  - board: nice_nano_v2
    shield: corne_left
  - board: nice_nano_v2
    shield: corne_right
